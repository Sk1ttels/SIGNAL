<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL PRO — Trading Bot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
  --bg: #080c10;
  --panel: #0d1117;
  --border: #1a2332;
  --accent: #00d4ff;
  --green: #00ff88;
  --red: #ff3366;
  --yellow: #ffcc00;
  --text: #c9d1d9;
  --dim: #4a5568;
  --glow-green: 0 0 20px rgba(0,255,136,0.4);
  --glow-red: 0 0 20px rgba(255,51,102,0.4);
  --glow-blue: 0 0 20px rgba(0,212,255,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanlines */
body::before {
  content:'';
  position:fixed; top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events:none; z-index:999;
}

.mono { font-family: 'Share Tech Mono', monospace; }

/* HEADER */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 24px;
  border-bottom:1px solid var(--border);
  background: linear-gradient(180deg, #0d1117 0%, transparent 100%);
}

.logo {
  font-size:22px; font-weight:700; letter-spacing:4px;
  color: var(--accent);
  text-shadow: var(--glow-blue);
}
.logo span { color: var(--green); }

.status-bar {
  display:flex; align-items:center; gap:20px;
}

.status-dot {
  width:8px; height:8px; border-radius:50%;
  background: var(--green);
  box-shadow: var(--glow-green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{ opacity:1; } 50%{ opacity:0.3; }
}

.mode-toggle {
  display:flex; gap:4px;
  background: var(--border);
  border-radius:6px; padding:3px;
}
.mode-btn {
  padding:5px 14px; border-radius:4px;
  border:none; cursor:pointer;
  font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:600;
  letter-spacing:1px;
  background:transparent; color:var(--dim);
  transition:.2s;
}
.mode-btn.active {
  background: var(--panel);
  color: var(--accent);
  box-shadow: var(--glow-blue);
}

/* GRID */
.main-grid {
  display:grid;
  grid-template-columns: 300px 1fr 280px;
  grid-template-rows: auto 1fr;
  gap:1px;
  height: calc(100vh - 60px);
  background: var(--border);
}

.panel {
  background: var(--panel);
  overflow:hidden;
}

/* PAIRS PANEL */
.pairs-panel {
  grid-row: 1 / 3;
  display:flex; flex-direction:column;
}

.panel-header {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.panel-title {
  font-size:11px; font-weight:600; letter-spacing:3px;
  color:var(--dim); text-transform:uppercase;
}

.search-box {
  margin:10px 12px;
  position:relative;
}
.search-box input {
  width:100%; padding:7px 12px 7px 30px;
  background: var(--bg);
  border:1px solid var(--border);
  border-radius:5px;
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  font-size:13px;
  outline:none;
  transition:.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-icon {
  position:absolute; left:9px; top:50%; transform:translateY(-50%);
  color:var(--dim); font-size:13px;
}

.pairs-list {
  flex:1; overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color: var(--border) transparent;
}

.pair-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px;
  border-bottom:1px solid rgba(26,35,50,0.5);
  cursor:pointer;
  transition:.15s;
  position:relative;
}
.pair-item:hover { background: rgba(0,212,255,0.04); }
.pair-item.active {
  background: rgba(0,212,255,0.08);
  border-left:2px solid var(--accent);
}
.pair-item.active::after {
  content:'';
  position:absolute; right:0; top:0; bottom:0; width:1px;
  background: var(--accent);
  box-shadow: var(--glow-blue);
}

.pair-name {
  font-size:14px; font-weight:700;
  color:var(--text);
}
.pair-type {
  font-size:10px; font-weight:600; letter-spacing:1px;
  color:var(--dim); margin-top:1px;
}
.pair-price {
  text-align:right;
  font-family:'Share Tech Mono',monospace;
  font-size:13px;
  color:var(--text);
}
.pair-change {
  font-size:11px;
  margin-top:1px;
}
.up { color:var(--green); }
.down { color:var(--red); }

/* CATEGORY */
.cat-header {
  padding:8px 16px;
  font-size:10px; font-weight:700; letter-spacing:3px;
  color:var(--dim); text-transform:uppercase;
  background: rgba(0,0,0,0.3);
  border-bottom:1px solid var(--border);
}

/* CHART AREA */
.chart-area {
  grid-column:2;
  display:flex; flex-direction:column;
}

.pair-info-bar {
  display:flex; align-items:center; gap:24px;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.current-pair {
  font-size:22px; font-weight:700;
  color:var(--text);
  letter-spacing:1px;
}
.current-price-big {
  font-family:'Share Tech Mono',monospace;
  font-size:24px; font-weight:700;
  color:var(--green);
  text-shadow: var(--glow-green);
}
.price-change-big {
  font-size:14px; font-weight:600;
  padding:3px 8px; border-radius:4px;
}
.price-change-big.up { background: rgba(0,255,136,0.1); color:var(--green); }
.price-change-big.down { background: rgba(255,51,102,0.1); color:var(--red); }

.tf-selector {
  display:flex; gap:3px; margin-left:auto;
}
.tf-btn {
  padding:4px 10px; border-radius:3px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--dim);
  font-family:'Rajdhani',sans-serif;
  font-size:12px; font-weight:600;
  cursor:pointer; transition:.15s;
  letter-spacing:1px;
}
.tf-btn:hover { border-color:var(--accent); color:var(--accent); }
.tf-btn.active {
  background: rgba(0,212,255,0.1);
  border-color:var(--accent);
  color:var(--accent);
}

.chart-container {
  flex:1;
  position:relative;
  overflow:hidden;
}

canvas#mainChart {
  width:100% !important;
  height:100% !important;
}

/* SIGNALS PANEL */
.signals-panel {
  grid-column:3;
  grid-row: 1 / 3;
  display:flex; flex-direction:column;
}

/* INDICATORS BAR */
.indicators-bar {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:1px;
  background: var(--border);
  border-top:1px solid var(--border);
  flex-shrink:0;
}

.indicator-cell {
  background: var(--panel);
  padding:10px 14px;
  text-align:center;
}
.ind-label {
  font-size:10px; font-weight:600; letter-spacing:2px;
  color:var(--dim); text-transform:uppercase; margin-bottom:3px;
}
.ind-value {
  font-family:'Share Tech Mono',monospace;
  font-size:15px; font-weight:700;
}
.ind-signal {
  font-size:10px; font-weight:600; letter-spacing:1px;
  margin-top:2px; text-transform:uppercase;
}

/* SIGNAL CARD */
.signal-list {
  flex:1; overflow-y:auto;
  padding:10px;
  scrollbar-width:thin;
  scrollbar-color: var(--border) transparent;
}

.signal-card {
  background: var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px;
  margin-bottom:8px;
  position:relative;
  overflow:hidden;
  animation: slideIn .3s ease;
}
@keyframes slideIn {
  from { transform:translateX(20px); opacity:0; }
  to   { transform:translateX(0); opacity:1; }
}

.signal-card.BUY {
  border-color: rgba(0,255,136,0.3);
  background: linear-gradient(135deg, rgba(0,255,136,0.05) 0%, var(--bg) 60%);
}
.signal-card.SELL {
  border-color: rgba(255,51,102,0.3);
  background: linear-gradient(135deg, rgba(255,51,102,0.05) 0%, var(--bg) 60%);
}

.signal-card::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:3px;
}
.signal-card.BUY::before { background:var(--green); box-shadow:var(--glow-green); }
.signal-card.SELL::before { background:var(--red); box-shadow:var(--glow-red); }

.sig-top {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px;
}
.sig-pair { font-size:15px; font-weight:700; }
.sig-dir {
  font-size:12px; font-weight:700; letter-spacing:2px;
  padding:3px 10px; border-radius:20px;
}
.BUY .sig-dir { background:rgba(0,255,136,0.15); color:var(--green); }
.SELL .sig-dir { background:rgba(255,51,102,0.15); color:var(--red); }

.sig-price {
  font-family:'Share Tech Mono',monospace;
  font-size:18px; font-weight:700;
  margin-bottom:6px;
}
.BUY .sig-price { color:var(--green); }
.SELL .sig-price { color:var(--red); }

.sig-meta {
  display:flex; gap:10px; flex-wrap:wrap;
}
.sig-badge {
  font-size:10px; font-weight:600; letter-spacing:1px;
  padding:2px 7px; border-radius:3px;
  background: var(--border);
  color:var(--dim);
  text-transform:uppercase;
}
.sig-badge.conf { background:rgba(255,204,0,0.1); color:var(--yellow); }

.sig-confidence {
  margin-top:8px;
}
.conf-label {
  display:flex; justify-content:space-between;
  font-size:10px; font-weight:600; letter-spacing:1px;
  color:var(--dim); margin-bottom:4px;
  text-transform:uppercase;
}
.conf-bar {
  height:3px; background:var(--border); border-radius:2px;
  overflow:hidden;
}
.conf-fill {
  height:100%; border-radius:2px;
  transition: width .8s cubic-bezier(.4,0,.2,1);
}
.BUY .conf-fill { background: linear-gradient(90deg, var(--green), #00ff88aa); }
.SELL .conf-fill { background: linear-gradient(90deg, var(--red), #ff336688); }

.sig-time {
  font-size:10px; color:var(--dim);
  font-family:'Share Tech Mono',monospace;
  margin-top:6px;
}

.sig-reasons {
  margin-top:6px;
  font-size:11px; color:var(--dim);
  line-height:1.6;
}

/* EMPTY STATE */
.empty-state {
  text-align:center; padding:40px 20px;
  color:var(--dim);
}
.empty-state .icon { font-size:40px; margin-bottom:12px; opacity:.3; }
.empty-state p { font-size:12px; letter-spacing:1px; }

/* STATS ROW */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr;
  gap:1px; background:var(--border);
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.stat-cell {
  background:var(--panel);
  padding:10px 14px;
  text-align:center;
}
.stat-num {
  font-family:'Share Tech Mono',monospace;
  font-size:20px; font-weight:700;
  color:var(--green);
}
.stat-lbl {
  font-size:10px; font-weight:600; letter-spacing:2px;
  color:var(--dim); text-transform:uppercase; margin-top:2px;
}

/* TOAST */
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  padding:10px 20px; border-radius:6px;
  font-size:13px; font-weight:600; letter-spacing:1px;
  z-index:1000;
  animation: toastIn .3s ease;
  pointer-events:none;
}
.toast.BUY { background:rgba(0,255,136,0.15); border:1px solid var(--green); color:var(--green); }
.toast.SELL { background:rgba(255,51,102,0.15); border:1px solid var(--red); color:var(--red); }
@keyframes toastIn {
  from { transform:translateX(-50%) translateY(20px); opacity:0; }
  to   { transform:translateX(-50%) translateY(0); opacity:1; }
}

/* RECONNECT BADGE */
.conn-badge {
  font-size:11px; font-weight:600; letter-spacing:1px;
  color:var(--dim); font-family:'Share Tech Mono',monospace;
}

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.loading-overlay {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:12px;
  background:var(--panel);
  z-index:10;
}
.spinner {
  width:32px; height:32px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text {
  font-size:11px; letter-spacing:3px; color:var(--dim);
  text-transform:uppercase;
}
</style>
</head>
<body>

<header>
  <div class="logo">SIGNAL<span>PRO</span></div>
  <div class="status-bar">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('FIN')" id="btn-FIN">FIN</button>
      <button class="mode-btn" onclick="setMode('OTC')" id="btn-OTC">OTC</button>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <span class="conn-badge mono" id="connLabel">CONNECTING...</span>
  </div>
</header>

<div class="main-grid">

  <!-- PAIRS -->
  <div class="panel pairs-panel">
    <div class="panel-header">
      <span class="panel-title">Инструменты</span>
      <span class="mono" style="font-size:11px;color:var(--dim)" id="pairsCount">0 пар</span>
    </div>
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" placeholder="Поиск..." id="pairSearch" oninput="filterPairs()">
    </div>
    <div class="pairs-list" id="pairsList"></div>
  </div>

  <!-- CHART -->
  <div class="panel chart-area">
    <div class="pair-info-bar">
      <div>
        <div class="current-pair" id="chartPair">—</div>
        <div style="font-size:11px;color:var(--dim)" id="chartType">—</div>
      </div>
      <div class="current-price-big mono" id="chartPrice">—</div>
      <div class="price-change-big up" id="chartChange">—</div>
      <div class="tf-selector" id="tfSelector">
        <button class="tf-btn" onclick="setTF('1m')">1м</button>
        <button class="tf-btn active" onclick="setTF('5m')">5м</button>
        <button class="tf-btn" onclick="setTF('15m')">15м</button>
        <button class="tf-btn" onclick="setTF('1h')">1ч</button>
        <button class="tf-btn" onclick="setTF('4h')">4ч</button>
      </div>
    </div>
    <div class="chart-container">
      <div class="loading-overlay" id="chartLoader">
        <div class="spinner"></div>
        <div class="loading-text">Загрузка котировок</div>
      </div>
      <canvas id="mainChart"></canvas>
    </div>
    <div class="indicators-bar" id="indicatorsBar">
      <div class="indicator-cell">
        <div class="ind-label">RSI (14)</div>
        <div class="ind-value" id="rsiVal" style="color:var(--dim)">—</div>
        <div class="ind-signal" id="rsiSig" style="color:var(--dim)">—</div>
      </div>
      <div class="indicator-cell">
        <div class="ind-label">MACD</div>
        <div class="ind-value" id="macdVal" style="color:var(--dim)">—</div>
        <div class="ind-signal" id="macdSig" style="color:var(--dim)">—</div>
      </div>
      <div class="indicator-cell">
        <div class="ind-label">Bollinger</div>
        <div class="ind-value" id="bbVal" style="color:var(--dim)">—</div>
        <div class="ind-signal" id="bbSig" style="color:var(--dim)">—</div>
      </div>
      <div class="indicator-cell">
        <div class="ind-label">EMA 9/21</div>
        <div class="ind-value" id="emaVal" style="color:var(--dim)">—</div>
        <div class="ind-signal" id="emaSig" style="color:var(--dim)">—</div>
      </div>
      <div class="indicator-cell">
        <div class="ind-label">Stoch RSI</div>
        <div class="ind-value" id="stochVal" style="color:var(--dim)">—</div>
        <div class="ind-signal" id="stochSig" style="color:var(--dim)">—</div>
      </div>
      <div class="indicator-cell">
        <div class="ind-label">СИГНАЛ</div>
        <div class="ind-value" id="overallSig" style="color:var(--dim);font-size:18px">—</div>
        <div class="ind-signal" id="overallConf" style="color:var(--dim)">—</div>
      </div>
    </div>
  </div>

  <!-- SIGNALS -->
  <div class="panel signals-panel">
    <div class="panel-header">
      <span class="panel-title">Сигналы</span>
      <button onclick="clearSignals()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;letter-spacing:1px;font-family:'Rajdhani',sans-serif;font-weight:600;">ОЧИСТИТЬ</button>
    </div>
    <div class="signal-list" id="signalList">
      <div class="empty-state">
        <div class="icon">📡</div>
        <p>ОЖИДАНИЕ СИГНАЛОВ</p>
        <p style="margin-top:6px;font-size:10px">Анализ рынка...</p>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-cell">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-lbl">Сигналов</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num" id="statAccuracy">—</div>
        <div class="stat-lbl">Точность</div>
      </div>
    </div>
  </div>

</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────
let mode = 'FIN';
let activePair = null;
let currentTF = '5m';
let prices = {};       // symbol -> {price, change, history:[]}
let candles = {};      // symbol -> tf -> [{o,h,l,c,t}]
let signals = [];
let ws = {};           // websocket connections
let animFrame = null;
let totalSignals = 0;
let trueSignals = 0;

// ─── INSTRUMENTS ─────────────────────────────────────────────────────
const FIN_PAIRS = [
  {sym:'BTCUSDT',  name:'BTC/USDT',  type:'Crypto',   base:65000,  vol:0.0008},
  {sym:'ETHUSDT',  name:'ETH/USDT',  type:'Crypto',   base:3200,   vol:0.001},
  {sym:'SOLUSDT',  name:'SOL/USDT',  type:'Crypto',   base:145,    vol:0.0015},
  {sym:'BNBUSDT',  name:'BNB/USDT',  type:'Crypto',   base:580,    vol:0.001},
  {sym:'XRPUSDT',  name:'XRP/USDT',  type:'Crypto',   base:0.52,   vol:0.002},
  {sym:'EURUSD',   name:'EUR/USD',   type:'Forex',    base:1.0855, vol:0.0002},
  {sym:'GBPUSD',   name:'GBP/USD',   type:'Forex',    base:1.2690, vol:0.0003},
  {sym:'USDJPY',   name:'USD/JPY',   type:'Forex',    base:151.50, vol:0.0003},
  {sym:'XAUUSD',   name:'XAU/USD',   type:'Commodity',base:2340,   vol:0.0004},
  {sym:'XAGUSD',   name:'XAG/USD',   type:'Commodity',base:27.5,   vol:0.0008},
  {sym:'USOIL',    name:'WTI Oil',   type:'Commodity',base:78.5,   vol:0.0006},
  {sym:'SP500',    name:'S&P 500',   type:'Index',    base:5250,   vol:0.0003},
];

const OTC_PAIRS = [
  {sym:'EURUSD_OTC',name:'EUR/USD OTC',type:'OTC',   base:1.0855, vol:0.0003},
  {sym:'GBPUSD_OTC',name:'GBP/USD OTC',type:'OTC',   base:1.2690, vol:0.0004},
  {sym:'USDJPY_OTC',name:'USD/JPY OTC',type:'OTC',   base:151.50, vol:0.0004},
  {sym:'AUDUSD_OTC',name:'AUD/USD OTC',type:'OTC',   base:0.6520, vol:0.0004},
  {sym:'USDCAD_OTC',name:'USD/CAD OTC',type:'OTC',   base:1.3620, vol:0.0003},
  {sym:'EURGBP_OTC',name:'EUR/GBP OTC',type:'OTC',   base:0.8560, vol:0.0003},
  {sym:'XAUUSD_OTC',name:'XAU OTC',    type:'OTC',   base:2340,   vol:0.0005},
  {sym:'BTCUSDT_OTC',name:'BTC OTC',   type:'OTC',   base:65000,  vol:0.001},
];

function getPairs(){ return mode==='FIN' ? FIN_PAIRS : OTC_PAIRS; }

// ─── INIT PRICES ─────────────────────────────────────────────────────
function initPrices(){
  getPairs().forEach(p=>{
    if(!prices[p.sym]){
      prices[p.sym] = {price: p.base, change: 0, history:[], vol: p.vol, base: p.base};
      candles[p.sym] = {};
      generateInitialCandles(p.sym);
    }
  });
}

function generateInitialCandles(sym){
  const p = prices[sym];
  const tfs = ['1m','5m','15m','1h','4h'];
  tfs.forEach(tf=>{
    candles[sym][tf] = [];
    let price = p.price * (0.97 + Math.random()*0.06);
    const count = 120;
    for(let i=0;i<count;i++){
      const vol = p.vol * (0.5 + Math.random()*1.5);
      const o = price;
      const change = (Math.random()-0.5)*2*vol;
      const c = o*(1+change);
      const h = Math.max(o,c) * (1 + Math.random()*vol*0.5);
      const l = Math.min(o,c) * (1 - Math.random()*vol*0.5);
      candles[sym][tf].push({o,h,l,c,t:Date.now()-((count-i)*tfMs(tf))});
      price = c;
    }
    prices[sym].price = price;
  });
  const hist = candles[sym]['5m'].map(c=>c.c);
  prices[sym].history = hist;
  prices[sym].change = ((prices[sym].price/prices[sym].base)-1)*100;
}

function tfMs(tf){
  const map={'1m':60e3,'5m':300e3,'15m':900e3,'1h':3600e3,'4h':14400e3};
  return map[tf]||300e3;
}

// ─── MULTI-SOURCE REAL DATA FEED ─────────────────────────────────────
// Джерела (авто-фалбек):
//   1. Binance REST klines + WS тікери  (найкраще, реалтайм)

// ── 1. BINANCE ────────────────────────────────────────────────────────
async function fetchBinanceKlines(sym, tf, limit=150){
  const url = `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${tf}&limit=${limit}`;
  const res = await fetch(url, {signal: AbortSignal.timeout(5000)});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  candles[sym][tf] = data.map(k=>({
    t:k[0], o:+k[1], h:+k[2], l:+k[3], c:+k[4]
  }));
  const last = candles[sym][tf].at(-1);
  if(prices[sym]){
    prices[sym].price  = last.c;
    prices[sym].change = ((last.c / candles[sym][tf][0].o) - 1) * 100;
  }
}

function connectBinanceWS(){
  if(binanceWS){ try{binanceWS.close()}catch(e){} }
  const streams = BINANCE_SYMS.map(s=>s.toLowerCase()+'@miniTicker').join('/');
  binanceWS = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);

  binanceWS.onopen  = ()=>{ updateConnStatus(true,'🟢 BINANCE WS LIVE'); dataSource='binance'; };
  binanceWS.onmessage = (e)=>{
    try{
      const d = JSON.parse(e.data).data;
      if(!d||!prices[d.s]) return;
      const price = +d.c, open24 = +d.o;
      prices[d.s].price  = price;
      prices[d.s].change = ((price/open24)-1)*100;
      prices[d.s].history.push(price);
      if(prices[d.s].history.length>500) prices[d.s].history.shift();
      updateCurrentCandle(d.s, price);
      renderPairs();
      if(activePair===d.s) updateIndicators(d.s);
      runSignalEngineFor(d.s);
    }catch(e){}
  };
  binanceWS.onerror = ()=>{ updateConnStatus(false,'⚠ BINANCE НЕДОСТУПНИЙ'); };
  binanceWS.onclose = ()=>{
    updateConnStatus(false,'🔄 ПЕРЕПІДКЛЮЧЕННЯ...');
    clearTimeout(wsReconnectTimer);
    wsReconnectTimer = setTimeout(connectBinanceWS, 4000);
  };
}

// ── 2. COINGECKO (fallback REST, оновлення кожні 15с) ────────────────
async function fetchCoinGeckoPrice(){
  const ids = Object.values(GECKO_MAP).join(',');
  const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
  const res = await fetch(url, {signal: AbortSignal.timeout(6000)});
  if(!res.ok) throw new Error('CG '+res.status);
  const data = await res.json();
  Object.entries(GECKO_MAP).forEach(([sym,id])=>{
    if(!data[id]||!prices[sym]) return;
    const price = data[id].usd;
    const chg   = data[id].usd_24h_change||0;
    prices[sym].price  = price;
    prices[sym].change = chg;
    prices[sym].history.push(price);
    if(prices[sym].history.length>500) prices[sym].history.shift();
    updateCurrentCandle(sym, price);
  });
  return true;
}

// CoinGecko не дає свічки безкоштовно — генеруємо правдоподібні
// на основі реальної поточної ціни та волатильності
function buildCandlesFromPrice(sym){
  if(!prices[sym]) return;
  const p = prices[sym];
  ['1m','5m','15m','1h','4h'].forEach(tf=>{
    if(candles[sym][tf] && candles[sym][tf].length>5) return; // вже є
    candles[sym][tf] = [];
    const pair = [...FIN_PAIRS,...OTC_PAIRS].find(x=>x.sym===sym);
    const vol = pair ? pair.vol : 0.001;
    let price = p.price * (1 - p.change/100); // стартова ціна 24г тому
    const count = 150;
    for(let i=0;i<count;i++){
      const drift = p.change/100/count; // дрейф до поточної ціни
      const o = price;
      const c = o*(1 + drift + (Math.random()-0.5)*vol*0.8);
      const h = Math.max(o,c)*(1+Math.random()*vol*0.3);
      const l = Math.min(o,c)*(1-Math.random()*vol*0.3);
      candles[sym][tf].push({o,h,l,c, t:Date.now()-((count-i)*tfMs(tf))});
      price = c;
    }
    // Останню свічку виставляємо на реальну ціну
    candles[sym][tf].at(-1).c = p.price;
  });
}

// ── 3. KRAKEN WS (другий резерв для крипто) ──────────────────────────
function connectKrakenWS(){
  if(krakenWS){ try{krakenWS.close()}catch(e){} }
  krakenWS = new WebSocket('wss://ws.kraken.com');
  krakenWS.onopen = ()=>{

  };

      const krakenPair = msg[3];
      const sym = Object.entries(KRAKEN_MAP).find(([,v])=>v===krakenPair)?.[0];
      if(!sym||!prices[sym]) return;
      const price = +msg[1].c[0];
      const open  = +msg[1].o[1];
      prices[sym].price  = price;
      prices[sym].change = ((price/open)-1)*100;
      prices[sym].history.push(price);
      if(prices[sym].history.length>500) prices[sym].history.shift();
      updateCurrentCandle(sym, price);
      renderPairs();
      if(activePair===sym) updateIndicators(sym);
      runSignalEngineFor(sym);
    }catch(e){}

  krakenWS.onerror = ()=>{ updateConnStatus(false,'⚠ KRAKEN ПОМИЛКА'); };
  krakenWS.onclose = ()=>{ setTimeout(connectKrakenWS, 5000); };
}

// ── ГОЛОВНИЙ ЗАПУСК — авто-вибір джерела ─────────────────────────────
async function startFeed(){
  clearInterval(tickInterval);
  if(binanceWS){ try{binanceWS.close()}catch(e){} binanceWS=null; }
  if(krakenWS){  try{krakenWS.close()}catch(e){} krakenWS=null;  }
  clearTimeout(wsReconnectTimer);
  if(window._forexTimer) clearInterval(window._forexTimer);

  initPrices();
  renderPairs();

  if(mode === 'OTC'){
    updateConnStatus(true,'🟡 OTC SIM FEED');
    BINANCE_SYMS.forEach(sym=>{ if(candles[sym]) buildCandlesFromPrice(sym); });
    startSimulatedFeed();
    return;
  }

  // FIN mode — пробуємо джерела по черзі
  updateConnStatus(false,'⏳ ЗАВАНТАЖЕННЯ...');

  // Крок 1: Спробувати Binance REST klines (найкраще — реальні свічки)
  let binanceOk = false;
  try {
    updateConnStatus(false,'⏳ BINANCE REST...');
    await fetchBinanceKlines('BTCUSDT','5m',5); // тест
    binanceOk = true;
  } catch(e){ binanceOk = false; }

  if(binanceOk){
    // Завантажуємо всі пари та таймфрейми фоново
    updateConnStatus(false,'📥 ЗАВАНТАЖЕННЯ СВІЧОК...');
    const tfs = ['1m','5m','15m','1h','4h'];
    const load = async()=>{
      for(const p of FIN_PAIRS.filter(x=>BINANCE_SYMS.includes(x.sym))){
        for(const tf of tfs){
          try{ await fetchBinanceKlines(p.sym, tf, 150); }catch(e){}
          await new Promise(r=>setTimeout(r,80));
        }
      }
      renderPairs();
      if(activePair) { renderChart(activePair); updateIndicators(activePair); }
    };
    load(); // фоново
    connectBinanceWS();
    startForexSimFeed();
    setTimeout(()=>{ if(activePair) renderChart(activePair); }, 1500);
    return;
  }

  // Крок 2: CoinGecko fallback
  let geckoOk = false;
  try {
    updateConnStatus(false,'⏳ COINGECKO...');
    geckoOk = await fetchCoinGeckoPrice();
  } catch(e){ geckoOk = false; }

  if(geckoOk){
    dataSource = 'coingecko';
    updateConnStatus(true,'🟢 COINGECKO LIVE');
    BINANCE_SYMS.forEach(sym=>buildCandlesFromPrice(sym));
    renderPairs();
    if(activePair){ renderChart(activePair); updateIndicators(activePair); }
    startForexSimFeed();

    // Оновлення цін кожні 15 секунд (ліміт CoinGecko)
    const geckoTimer = setInterval(async()=>{
      try{
        await fetchCoinGeckoPrice();
        renderPairs();
        if(activePair) updateIndicators(activePair);
        runSignalEngine();
      }catch(e){}
    }, 15000);

    // Паралельно намагаємось підключити Kraken WS
    try{ connectKrakenWS(); }catch(e){}
    return;
  }

  // Крок 3: Kraken WS
  try {
    updateConnStatus(false,'⏳ KRAKEN WS...');
    connectKrakenWS();
    BINANCE_SYMS.forEach(sym=>buildCandlesFromPrice(sym));
    startForexSimFeed();
    return;
  } catch(e){}

  // Крок 4: Повна симуляція
  updateConnStatus(false,'📴 OFFLINE — СИМУЛЯЦІЯ');
  startSimulatedFeed();
}

function updateCurrentCandle(sym, price){
  const now = Date.now();
  const tfs = ['1m','5m','15m','1h','4h'];
  tfs.forEach(tf=>{
    const arr = candles[sym][tf];
    if(!arr||arr.length===0) return;
    const last = arr[arr.length-1];
    const elapsed = now - last.t;
    if(elapsed >= tfMs(tf)){
      // new candle
      arr.push({o:last.c, h:price, l:price, c:price, t:now});
      if(arr.length>200) arr.shift();
    } else {
      last.c = price;
      last.h = Math.max(last.h, price);
      last.l = Math.min(last.l, price);
    }
  });
}

function updateConnStatus(ok, label){
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('connLabel');
  dot.style.background = ok ? 'var(--green)' : 'var(--yellow)';
  dot.style.boxShadow = ok ? 'var(--glow-green)' : '0 0 10px rgba(255,204,0,0.4)';
  lbl.textContent = label || (ok ? 'LIVE' : 'RECONNECTING...');
}

// Перевіряємо сигнал тільки для конкретної пари (викликається з WS)
let sigCheckThrottle = {};
function runSignalEngineFor(sym){
  const now = Date.now();
  if(sigCheckThrottle[sym] && now - sigCheckThrottle[sym] < 4000) return;
  sigCheckThrottle[sym] = now;

  const pair = getPairs().find(p=>p.sym===sym);
  if(!pair) return;
  const arr = (candles[sym]||{})[currentTF]||[];
  if(arr.length<80) return;
  const score = getSignalScore(sym, arr);
  if(score.dir==='NONE') return;
  if(score.conf < 82) return;

  const last = lastSignalTime[sym+currentTF]||0;
  const cooldown = tfMs(currentTF)*6;
  if(now-last<cooldown) return;

  lastSignalTime[sym+currentTF] = now;
  emitSignal(pair, score, arr[arr.length-1].c);
}

function renderPairs(){
  const query = document.getElementById('pairSearch').value.toLowerCase();
  const list = document.getElementById('pairsList');
  const pairs = getPairs().filter(p=> p.name.toLowerCase().includes(query)||p.sym.toLowerCase().includes(query));

  const groups = {};
  pairs.forEach(p=>{ (groups[p.type]||(groups[p.type]=[])).push(p); });

  let html = '';
  Object.entries(groups).forEach(([type,arr])=>{
    html += `<div class="cat-header">${type}</div>`;

      if(!st) return;

      html += `<div class="pair-item ${isActive?'active':''}" onclick="selectPair('${p.sym}')">

          <div class="pair-name">${p.name}</div>

          <div class="pair-change ${up?'up':'down'}">${up?'+':''}${st.change.toFixed(2)}%</div>
        </div>
      </div>`;
    });
  });

  list.innerHTML = html;
  document.getElementById('pairsCount').textContent = pairs.length+' пар';
}

// ─── CANVAS CHART ────────────────────────────────────────────────────
function renderChart(sym){
  const loader = document.getElementById('chartLoader');
  loader.style.display='flex';
  setTimeout(()=>{ drawChart(sym); loader.style.display='none'; }, 300);
}

function drawChart(sym){
  const canvas = document.getElementById('mainChart');
  const ctx = canvas.getContext('2d');
  const container = canvas.parentElement;
  canvas.width = container.clientWidth * devicePixelRatio;
  canvas.height = container.clientHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = container.clientWidth;
  const H = container.clientHeight;
  ctx.clearRect(0,0,W,H);

  const arr = (candles[sym]||{})[currentTF]||[];
  if(arr.length<2) return;
  const data = arr.slice(-80);

  const margin = {top:20, right:60, bottom:30, left:10};
  const chartW = W - margin.left - margin.right;
  const chartH = H - margin.top - margin.bottom;

  const highs = data.map(c=>c.h);
  const lows  = data.map(c=>c.l);
  const maxP = Math.max(...highs)*1.001;
  const minP = Math.min(...lows)*0.999;
  const range = maxP - minP;

  const candleW = Math.max(2, (chartW/data.length)*0.7);

  const px = (i)=> margin.left + (i+0.5)*(chartW/data.length);
  const py = (p)=> margin.top + chartH - ((p-minP)/range)*chartH;

  // Grid
  ctx.strokeStyle='rgba(26,35,50,0.8)'; ctx.lineWidth=1;
  const gridLines = 5;
  for(let i=0;i<=gridLines;i++){
    const y = margin.top + (i/gridLines)*chartH;
    ctx.beginPath(); ctx.moveTo(margin.left,y); ctx.lineTo(W-margin.right,y); ctx.stroke();
    const price = maxP - (i/gridLines)*range;
    ctx.fillStyle='rgba(74,85,104,0.8)';
    ctx.font=`10px 'Share Tech Mono'`;
    ctx.fillText(formatPrice(price,sym), W-margin.right+4, y+4);
  }

  // EMA lines
  const closes = data.map(c=>c.c);
  const ema9  = calcEMA(closes, 9);
  const ema21 = calcEMA(closes, 21);

  const drawLine = (vals, color, dash=[])=>{
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.5;
    ctx.setLineDash(dash);
    vals.forEach((v,i)=>{ if(v===null) return; i===0||vals[i-1]===null ? ctx.moveTo(px(i),py(v)) : ctx.lineTo(px(i),py(v)); });
    ctx.stroke(); ctx.setLineDash([]);
  };

  drawLine(ema9,  'rgba(0,212,255,0.6)');
  drawLine(ema21, 'rgba(255,204,0,0.5)');

  // Bollinger
  const bb = calcBB(closes, 20);
  drawLine(bb.upper,'rgba(100,100,160,0.4)',[3,3]);
  drawLine(bb.lower,'rgba(100,100,160,0.4)',[3,3]);

  // Candles
  data.forEach((c,i)=>{
    const up = c.c>=c.o;
    const x = px(i);
    ctx.strokeStyle = up ? 'rgba(0,255,136,0.8)' : 'rgba(255,51,102,0.8)';
    ctx.fillStyle   = up ? 'rgba(0,255,136,0.3)'  : 'rgba(255,51,102,0.3)';
    ctx.lineWidth = 1;

    // Wick
    ctx.beginPath();
    ctx.moveTo(x, py(c.h)); ctx.lineTo(x, py(c.l));
    ctx.stroke();

    // Body
    const bodyTop = py(Math.max(c.o,c.c));
    const bodyBot = py(Math.min(c.o,c.c));
    const bH = Math.max(1, bodyBot-bodyTop);
    ctx.fillRect(x-candleW/2, bodyTop, candleW, bH);
    ctx.strokeRect(x-candleW/2, bodyTop, candleW, bH);
  });

  // Price label
  const lastPrice = data[data.length-1].c;
  const lastY = py(lastPrice);
  ctx.fillStyle='rgba(0,255,136,0.15)';
  ctx.fillRect(W-margin.right, lastY-8, margin.right-2, 16);
  ctx.strokeStyle='var(--green)'; ctx.lineWidth=1;
  ctx.strokeRect(W-margin.right, lastY-8, margin.right-2, 16);
  ctx.fillStyle='#00ff88';
  ctx.font=`bold 10px 'Share Tech Mono'`;
  ctx.fillText(formatPrice(lastPrice,sym), W-margin.right+4, lastY+4);

  // Price line
  ctx.strokeStyle='rgba(0,255,136,0.3)'; ctx.lineWidth=1; ctx.setLineDash([3,4]);
  ctx.beginPath(); ctx.moveTo(margin.left,lastY); ctx.lineTo(W-margin.right,lastY); ctx.stroke();
  ctx.setLineDash([]);

  // Update header price
  document.getElementById('chartPrice').textContent = formatPrice(lastPrice,sym);
  const st = prices[sym];
  const chEl = document.getElementById('chartChange');
  const chg = st?st.change:0;
  chEl.textContent = (chg>=0?'+':'')+chg.toFixed(2)+'%';
  chEl.className = 'price-change-big '+(chg>=0?'up':'down');

  // Start animation loop
  if(animFrame) cancelAnimationFrame(animFrame);
  let lastDraw = 0;
  const loop = (ts)=>{
    if(activePair===sym && ts-lastDraw>1000){
      drawChart(sym);
      lastDraw=ts;
    }
    animFrame = requestAnimationFrame(loop);
  };
  animFrame = requestAnimationFrame(loop);
}

// ─── TECHNICAL INDICATORS ────────────────────────────────────────────
function calcEMA(data, period){
  const k = 2/(period+1);
  const result = new Array(data.length).fill(null);
  let ema = null;
  for(let i=0;i<data.length;i++){
    if(i<period-1){ result[i]=null; continue; }
    if(ema===null) ema = data.slice(0,period).reduce((a,b)=>a+b)/period;
    else ema = data[i]*k + ema*(1-k);
    result[i]=ema;
  }
  return result;
}

function calcRSI(data, period=14){
  if(data.length<period+1) return null;
  let gains=0, losses=0;
  for(let i=1;i<=period;i++){
    const d=data[i]-data[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  let avgG=gains/period, avgL=losses/period;
  for(let i=period+1;i<data.length;i++){
    const d=data[i]-data[i-1];
    avgG = (avgG*(period-1)+(d>0?d:0))/period;
    avgL = (avgL*(period-1)+(d<0?-d:0))/period;
  }
  if(avgL===0) return 100;
  return 100 - (100/(1+avgG/avgL));
}

function calcMACD(data){
  const ema12 = calcEMA(data,12);
  const ema26 = calcEMA(data,26);
  const macdLine = data.map((_,i)=> ema12[i]!==null&&ema26[i]!==null ? ema12[i]-ema26[i] : null);
  const valid = macdLine.filter(x=>x!==null);
  const signal = calcEMA(valid, 9);
  const last = valid[valid.length-1];
  const sigLast = signal[signal.length-1];
  const prevMacd = valid[valid.length-2]||0;
  const prevSig  = signal[signal.length-2]||0;
  return {macd:last, signal:sigLast, hist:last-sigLast, crossUp: prevMacd<prevSig && last>sigLast, crossDown: prevMacd>prevSig && last<sigLast};
}

function calcBB(data, period=20, mult=2){
  const upper=[], lower=[], mid=[];
  for(let i=0;i<data.length;i++){
    if(i<period-1){ upper.push(null);lower.push(null);mid.push(null); continue; }
    const slice=data.slice(i-period+1,i+1);
    const m=slice.reduce((a,b)=>a+b)/period;
    const std=Math.sqrt(slice.map(x=>(x-m)**2).reduce((a,b)=>a+b)/period);
    upper.push(m+mult*std); lower.push(m-mult*std); mid.push(m);
  }
  const n=data.length-1;
  return {upper,lower,mid, lastU:upper[n],lastL:lower[n],lastM:mid[n]};
}

function calcStochRSI(data, period=14, smooth=3){
  const rsiArr=[];
  for(let i=period;i<=data.length;i++){
    rsiArr.push(calcRSI(data.slice(i-period,i),period-1)||50);
  }
  if(rsiArr.length<period) return {k:50,d:50};
  const slice=rsiArr.slice(-period);
  const hi=Math.max(...slice), lo=Math.min(...slice);
  const k= hi===lo ? 50 : ((rsiArr[rsiArr.length-1]-lo)/(hi-lo))*100;
  return {k, d:k}; // simplified
}

// МАКСИМАЛЬНО ТОЧНИЙ ДВИЖОК СИГНАЛІВ
// Принцип: краще 2 точних ніж 20 сумнівних
// Потрібно пройти ВСІ 7 фільтрів — якщо хоч один не пройшов: NONE
// ═══════════════════════════════════════════════════════════════════
let lastSignalTime = {};

// ── ДОПОМІЖНІ РОЗРАХУНКИ ────────────────────────────────────────────

// ATR — середній справжній діапазон (міра волатильності)
function calcATR(arr, period=14){
  if(arr.length < period+1) return null;
  const trs = arr.slice(1).map((c,i)=>{
    const prev = arr[i];
    return Math.max(c.h-c.l, Math.abs(c.h-prev.c), Math.abs(c.l-prev.c));
  });
  // Wilder smoothing
  let atr = trs.slice(0,period).reduce((a,b)=>a+b)/period;
  for(let i=period; i<trs.length; i++) atr = (atr*(period-1)+trs[i])/period;
  return atr;
}

// ADX — сила тренду (>25 = тренд є, <20 = флет)
function calcADX(arr, period=14){
  if(arr.length < period*2) return {adx:0, pdi:0, mdi:0};
  const plusDM=[], minusDM=[], tr=[];
  for(let i=1;i<arr.length;i++){
    const hi = arr[i].h - arr[i-1].h;
    const lo = arr[i-1].l - arr[i].l;
    plusDM.push(hi>lo && hi>0 ? hi : 0);
    minusDM.push(lo>hi && lo>0 ? lo : 0);
    tr.push(Math.max(arr[i].h-arr[i].l, Math.abs(arr[i].h-arr[i-1].c), Math.abs(arr[i].l-arr[i-1].c)));
  }
  const smooth = (data, p) => {
    let s = data.slice(0,p).reduce((a,b)=>a+b);
    const res=[s];
    for(let i=p;i<data.length;i++){ s = s - s/p + data[i]; res.push(s); }
    return res;
  };
  const sTR=smooth(tr,period), sPDM=smooth(plusDM,period), sMDM=smooth(minusDM,period);
  const pdi = sPDM.map((v,i)=>sTR[i]?v/sTR[i]*100:0);
  const mdi = sMDM.map((v,i)=>sTR[i]?v/sTR[i]*100:0);
  const dx  = pdi.map((v,i)=> (pdi[i]+mdi[i])>0 ? Math.abs(pdi[i]-mdi[i])/(pdi[i]+mdi[i])*100 : 0);
  const adxArr = smooth(dx, period);
  const n = adxArr.length-1;
  return {adx: adxArr[n], pdi: pdi[pdi.length-1], mdi: mdi[mdi.length-1]};
}

// Нахил EMA50 (сила та напрямок тренду)
function calcTrendStrength(closes){
  const ema50 = calcEMA(closes, 50);
  const n = ema50.length-1;
  if(!ema50[n]||!ema50[n-8]) return 0;
  return (ema50[n]-ema50[n-8])/ema50[n-8]*100;
}

// Дивергенція RSI — ціна робить новий екстремум, RSI ні
function calcRSIDivergence(closes, arr, dir){
  if(closes.length < 30) return false;
  const rsiAll = [];
  for(let i=14; i<=closes.length; i++) rsiAll.push(calcRSI(closes.slice(0,i)));
  const n = rsiAll.length-1;
  if(rsiAll[n]===null) return false;

  if(dir==='BUY'){
    // Бичача дивергенція: ціна нижче, RSI вище
    const priceLL = closes[closes.length-1] < Math.min(...closes.slice(-20,-1));
    const rsiHL   = rsiAll[n] > rsiAll[n-5];
    return priceLL && rsiHL;
  } else {
    // Ведмежа дивергенція: ціна вище, RSI нижче
    const priceHH = closes[closes.length-1] > Math.max(...closes.slice(-20,-1));
    const rsiLH   = rsiAll[n] < rsiAll[n-5];
    return priceHH && rsiLH;
  }
}

// Рівні підтримки/спротиву (pivot points)
function calcPivots(arr){
  const slice = arr.slice(-20);
  const h = Math.max(...slice.map(c=>c.h));
  const l = Math.min(...slice.map(c=>c.l));
  const c = slice.at(-1).c;
  const pivot = (h+l+c)/3;
  return {
    r1: 2*pivot - l,
    s1: 2*pivot - h,
    pivot,
    nearSupport: (price) => Math.abs(price-l)/price < 0.003,
    nearResist:  (price) => Math.abs(price-h)/price < 0.003,
  };
}

// Свічковий патерн (строгий)
function candlePattern(arr, dir){
  if(arr.length < 5) return {ok:false, name:''};
  const c  = arr.at(-1);
  const p1 = arr.at(-2);
  const p2 = arr.at(-3);
  const body = x => Math.abs(x.c-x.o);
  const bull = x => x.c > x.o;
  const bear = x => x.c < x.o;
  const atr  = (arr.slice(-10).reduce((s,x)=>s+(x.h-x.l),0))/10;

  if(dir==='BUY'){
    // 1. Бичаче поглинання
    if(bear(p1) && bull(c) && c.c>p1.o && c.o<p1.c && body(c)>body(p1)*1.0)
      return {ok:true, name:'Бичаче поглинання'};
    // 2. Молот (Hammer) — довга нижня тінь
    const lowerWick = Math.min(c.o,c.c) - c.l;
    const upperWick = c.h - Math.max(c.o,c.c);
    if(lowerWick > body(c)*2 && upperWick < body(c)*0.5 && lowerWick > atr*0.4)
      return {ok:true, name:'Молот'};
    // 3. Три бичачих свічки поспіль із зростанням
    if(bull(c)&&bull(p1)&&bull(p2) && c.c>p1.c && p1.c>p2.c)
      return {ok:true, name:'Три бики'};
    // 4. Пін-бар від підтримки
    if(lowerWick > body(c)*3 && c.c > (c.h+c.l)/2)
      return {ok:true, name:'Пін-бар (підтримка)'};
  }

  if(dir==='SELL'){
    // 1. Ведмеже поглинання
    if(bull(p1) && bear(c) && c.c<p1.o && c.o>p1.c && body(c)>body(p1)*1.0)
      return {ok:true, name:'Ведмеже поглинання'};
    // 2. Повішений (Hanging Man) — довга верхня тінь
    const upperWick2 = c.h - Math.max(c.o,c.c);
    const lowerWick2 = Math.min(c.o,c.c) - c.l;
    if(upperWick2 > body(c)*2 && lowerWick2 < body(c)*0.5 && upperWick2 > atr*0.4)
      return {ok:true, name:'Зірка падіння'};
    // 3. Три ведмежих свічки поспіль
    if(bear(c)&&bear(p1)&&bear(p2) && c.c<p1.c && p1.c<p2.c)
      return {ok:true, name:'Три ведмеді'};
    // 4. Пін-бар від спротиву
    if(upperWick2 > body(c)*3 && c.c < (c.h+c.l)/2)
      return {ok:true, name:'Пін-бар (спротив)'};
  }
  return {ok:false, name:''};
}

// ── ГОЛОВНА ФУНКЦІЯ ОЦІНКИ (7 фільтрів) ────────────────────────────
function getSignalScore(sym, arr){
  const NONE = (v={buy:0,sell:0}) => ({dir:'NONE', conf:0, reasons:[], votes:v, filterFailed:''});
  if(arr.length < 100) return NONE();

  const closes = arr.map(c=>c.c);
  const highs  = arr.map(c=>c.h);
  const lows   = arr.map(c=>c.l);

  // ── Розраховуємо всі індикатори ──
  const rsi    = calcRSI(closes);
  const macd   = calcMACD(closes);
  const bb     = calcBB(closes, 20, 2);
  const stoch  = calcStochRSI(closes);
  const ema9   = calcEMA(closes,9).at(-1);
  const ema21  = calcEMA(closes,21).at(-1);
  const ema50  = calcEMA(closes,50).at(-1);
  const ema200 = calcEMA(closes,200);
  const ema200Last = ema200.at(-1);
  const ema200Prev = ema200.at(-10);
  const atr    = calcATR(arr);
  const adx    = calcADX(arr);
  const trend  = calcTrendStrength(closes);
  const pivots = calcPivots(arr);
  const lastC  = closes.at(-1);

  let buyV=0, sellV=0;
  const buyR=[], sellR=[];

  // ══ ГОЛОСУВАННЯ (5 блоків по 1 голосу) ══════════════════════════

  // 1. RSI + Stoch RSI — ОБИДВА мають бути в зоні
  const rsiBuy  = rsi!==null && rsi<=30;
  const rsiSell = rsi!==null && rsi>=70;
  const stBuy   = stoch.k<=20;
  const stSell  = stoch.k>=80;
  if(rsiBuy  && stBuy ){ buyV++;  buyR.push(`RSI ${rsi.toFixed(0)} + Stoch ${stoch.k.toFixed(0)} — перепродано`); }
  if(rsiSell && stSell){ sellV++; sellR.push(`RSI ${rsi.toFixed(0)} + Stoch ${stoch.k.toFixed(0)} — перекуплено`); }

  // 2. MACD — тільки справжнє пересечення нуля або сигнальної
  if(macd.crossUp)  { buyV++;  buyR.push('MACD бичаче пересечення'); }
  if(macd.crossDown){ sellV++; sellR.push('MACD ведмеже пересечення'); }

  // 3. Bollinger Bands — торкання + відскок (ціна повернулась всередину)
  if(bb.lastL && bb.lastU){
    const pos = (lastC-bb.lastL)/(bb.lastU-bb.lastL);
    const prevPos = (closes.at(-2)-bb.lastL)/(bb.lastU-bb.lastL);
    // Відскок від нижньої: торкнулись і відскочили вгору
    if(prevPos<=0.05 && pos>prevPos){ buyV++;  buyR.push('BB відскок від нижньої межі'); }
    // Відскок від верхньої: торкнулись і відскочили вниз
    if(prevPos>=0.95 && pos<prevPos){ sellV++; sellR.push('BB відскок від верхньої межі'); }
  }

  // 4. EMA стек 9/21/50 + напрямок EMA200
  if(ema9&&ema21&&ema50&&ema200Last){
    const bull200 = ema200Last > (ema200Prev||ema200Last);
    const bear200 = ema200Last < (ema200Prev||ema200Last);
    if(ema9>ema21 && ema21>ema50 && bull200){ buyV++;  buyR.push('EMA 9>21>50 + EMA200 зростає'); }
    if(ema9<ema21 && ema21<ema50 && bear200){ sellV++; sellR.push('EMA 9<21<50 + EMA200 падає'); }
  }

  // 5. Рівні підтримки/спротиву + об'єм свічок
  const lastBody = Math.abs(arr.at(-1).c - arr.at(-1).o);
  const avgBody  = arr.slice(-20).reduce((s,c)=>s+Math.abs(c.c-c.o),0)/20;
  const strongCandle = lastBody > avgBody * 1.3; // свічка сильніша за середню
  if(pivots.nearSupport(lastC) && strongCandle){ buyV++;  buyR.push('Відскок від рівня підтримки'); }
  if(pivots.nearResist(lastC)  && strongCandle){ sellV++; sellR.push('Відскок від рівня спротиву'); }

  const votes = {buy:buyV, sell:sellV};

  // ══ 7 ОБОВ'ЯЗКОВИХ ФІЛЬТРІВ ══════════════════════════════════════

  // Ф1: Мінімум 4/5 голосів
  const maxV = Math.max(buyV, sellV);
  if(maxV < 4) return NONE(votes);
  const dir = buyV>=4 ? 'BUY' : 'SELL';
  const reasons = dir==='BUY' ? buyR : sellR;

  // Ф2: ADX > 22 — ринок У ТРЕНДІ, не флет
  if(adx.adx < 22) return {...NONE(votes), filterFailed:`ADX ${adx.adx.toFixed(0)} < 22 (флет)`};

  // Ф3: Напрямок ADX (PDI/MDI) відповідає сигналу
  if(dir==='BUY'  && adx.pdi <= adx.mdi) return {...NONE(votes), filterFailed:'ADX: тренд ведмежий'};
  if(dir==='SELL' && adx.mdi <= adx.pdi) return {...NONE(votes), filterFailed:'ADX: тренд бичачий'};

  // Ф4: ATR достатній (не нульова волатильність, не екстремальна)
  if(!atr) return NONE(votes);
  const atrPct = atr/lastC*100;
  if(atrPct < 0.05) return {...NONE(votes), filterFailed:'ATR занадто низький (немає руху)'};
  if(atrPct > 8.0)  return {...NONE(votes), filterFailed:'ATR занадто високий (хаос)'};

  // Ф5: Свічковий патерн підтверджено
  const pattern = candlePattern(arr, dir);
  if(!pattern.ok) return {...NONE(votes), filterFailed:'Немає свічкового патерну'};
  reasons.push(`Патерн: ${pattern.name}`);

  // Ф6: Нахил тренду відповідає напрямку
  if(dir==='BUY'  && trend < 0.008) return {...NONE(votes), filterFailed:'Тренд не підтверджує BUY'};
  if(dir==='SELL' && trend > -0.008) return {...NONE(votes), filterFailed:'Тренд не підтверджує SELL'};

  // Ф7: Нуль протилежних голосів (сигнал без суперечностей)
  const oppV = dir==='BUY' ? sellV : buyV;
  if(oppV > 0) return {...NONE(votes), filterFailed:`${oppV} протилежних голоси`};

  // ══ БОНУС: RSI дивергенція ══
  const diverg = calcRSIDivergence(closes, arr, dir);
  if(diverg){ reasons.push('RSI дивергенція ✓'); }

  // ══ РОЗРАХУНОК ВПЕВНЕНОСТІ ══
  let conf = 82;                                      // база
  if(maxV === 5)             conf += 8;               // всі 5 голосів
  if(adx.adx > 35)           conf += 4;               // сильний тренд
  if(atrPct > 0.15 && atrPct < 3.0) conf += 3;       // здорова волатильність
  if(diverg)                 conf += 4;               // дивергенція
  if(Math.abs(trend) > 0.08) conf += 3;               // крутий нахил
  conf = Math.min(conf, 97);

  return {dir, conf, reasons, votes, filterFailed:'', pattern: pattern.name};
}

let signalCheckCounter = 0;
function runSignalEngine(){
  signalCheckCounter++;
  if(signalCheckCounter % 6 !== 0) return;
  getPairs().forEach(p=> runSignalEngineFor(p.sym));
}

function emitSignal(pair, score, price){
  totalSignals++;
  if(score.conf>=82) trueSignals++;
  // voteCount already set above

  const voteCount = score.dir==='BUY' ? score.votes.buy : score.votes.sell;
  const sig = {
    pair: pair.name,
    sym:  pair.sym,
    dir:  score.dir,
    price: price,
    conf: score.conf,
    tf: currentTF,
    mode: mode,
    reasons: score.reasons,
    voteCount: voteCount,
    pattern: score.pattern||'',
    time: new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
  };

  signals.unshift(sig);
  if(signals.length>50) signals.pop();

  renderSignals();
  showToast(sig);
  updateStats();
}

function renderSignals(){
  const list = document.getElementById('signalList');
  if(signals.length===0){
    list.innerHTML=`<div class="empty-state"><div class="icon">📡</div><p>ОЖИДАНИЕ СИГНАЛОВ</p></div>`;
    return;
  }
  list.innerHTML = signals.map(s=>`
    <div class="signal-card ${s.dir}" onclick="selectPair('${s.sym}')">
      <div class="sig-top">
        <div class="sig-pair">${s.pair}</div>
        <div class="sig-dir">${s.dir}</div>
      </div>
      <div class="sig-price">${formatPrice(s.price, s.sym)}</div>
      <div class="sig-meta">
        <span class="sig-badge">${s.tf}</span>
        <span class="sig-badge">${s.mode}</span>
        <span class="sig-badge conf">⚡ ${s.conf}%</span>
        <span class="sig-badge" style="background:rgba(0,212,255,0.1);color:var(--accent)">✓ ${s.voteCount}/5</span>
        ${s.pattern ? `<span class="sig-badge" style="background:rgba(255,204,0,0.1);color:var(--yellow)">${s.pattern}</span>` : ''}
      </div>
      <div class="sig-confidence">
        <div class="conf-label">
          <span>УВЕРЕННОСТЬ</span>
          <span class="mono">${s.conf}%</span>
        </div>
        <div class="conf-bar">
          <div class="conf-fill" style="width:${s.conf}%"></div>
        </div>
      </div>
      <div class="sig-reasons">${s.reasons.slice(0,3).join(' · ')}</div>
      <div class="sig-time">⏱ ${s.time}</div>
    </div>
  `).join('');
}

function updateStats(){
  document.getElementById('statTotal').textContent = totalSignals;
  const acc = totalSignals>0 ? Math.round((trueSignals/totalSignals)*100) : 0;
  const el = document.getElementById('statAccuracy');
  el.textContent = acc>0 ? acc+'%' : '—';
  el.style.color = acc>=70 ? 'var(--green)' : 'var(--yellow)';
}

let toastTimer=null;
function showToast(sig){
  const existing=document.querySelector('.toast');
  if(existing) existing.remove();
  const t=document.createElement('div');
  t.className='toast '+sig.dir;
  t.textContent=`${sig.dir} ${sig.pair} @ ${formatPrice(sig.price,sig.sym)} · ${sig.conf}%`;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(),4000);
}

function clearSignals(){
  signals=[];
  totalSignals=0; trueSignals=0;
  renderSignals(); updateStats();
}

// ─── MODE SWITCH ─────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.getElementById('btn-FIN').classList.toggle('active', m==='FIN');
  document.getElementById('btn-OTC').classList.toggle('active', m==='OTC');
  activePair=null;
  signals=[];
  document.getElementById('chartPair').textContent='—';
  document.getElementById('chartPrice').textContent='—';
  document.getElementById('chartChange').textContent='—';
  updateConnStatus(false);
  setTimeout(()=>{ startFeed(); }, 600);
  renderSignals();
}

// ─── BOOT ────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{
  // TF buttons fix
  document.querySelectorAll('.tf-btn').forEach(b=>{
    const map={'1м':'1m','5м':'5m','15м':'15m','1ч':'1h','4ч':'4h'};
    const tf=map[b.textContent];
    if(tf) b.onclick=()=>setTF(tf);
  });

  startFeed();

  // Вибираємо першу пару після завантаження свічок
  setTimeout(()=>{
    const first = getPairs()[0];
    selectPair(first.sym);
  }, 2500);
});

window.addEventListener('resize', ()=>{
  if(activePair) drawChart(activePair);
});
</script>
